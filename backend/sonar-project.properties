# SonarCloud configuration.
# The SonarCloud GitHub App auto-analyzes this repo, but without this file it
# mis-scopes the analysis (it inherited a stale whole-project "Security E"
# rating despite zero issues on the PR diff). This file tells the scanner where
# the source is and how to compute "new code" for PR/branch analysis.
sonar.projectKey=ahmadUffi_tipschain
sonar.organization=ahmaduffi

# Source roots + exclusions. Only the NestJS backend lives here for now.
sonar.sources=src
sonar.tests=src,test
sonar.exclusions=**/node_modules/**,**/*.spec.ts,**/dist/**
sonar.test.inclusions=**/*.spec.ts,**/*.e2e-spec.ts

# Coverage is reported separately; tell SonarCloud where the LCOV is once wired.
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# TypeScript coverage of test files distorts metrics — exclude them from coverage.
sonar.coverage.exclusions=**/*.spec.ts,**/*.e2e-spec.ts,test/**
