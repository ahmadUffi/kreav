name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop]

jobs:
  backend:
    name: Backend (lint / build / test)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    services:
      kreav-db:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: kreav
          POSTGRES_PASSWORD: kreav
          POSTGRES_DB: kreav
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kreav -d kreav"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://kreav:kreav@localhost:5432/kreav?schema=public
      NODE_ENV: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: backend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma:generate

      - name: Apply migrations
        run: pnpm prisma migrate deploy

      - name: Lint
        run: pnpm lint:check

      - name: Build
        run: pnpm build

      - name: Unit tests
        run: pnpm test --ci

      - name: E2E tests
        run: pnpm test:e2e --ci

  frontend:
    name: Frontend (lint / build)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL || 'https://api.kreav.space' }}
        run: npm run build
