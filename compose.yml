# Local development services for Kreav.
# Start everything:  docker compose up -d
# Just the database: docker compose up -d kreav-db
services:
  kreav-db:
    image: postgres:16-alpine
    container_name: kreav-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: kreav
      POSTGRES_PASSWORD: kreav
      POSTGRES_DB: kreav
    ports:
      - '5432:5432'
    volumes:
      - kreav-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U kreav -d kreav']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  kreav-db-data:
