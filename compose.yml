# Local development services for Kreav.
# Credentials are read from the root `.env` (gitignored) via interpolation —
# nothing sensitive is hard-coded here. See `.env.example` for the variables.
#
# Start everything:  docker compose up -d
# Just the database: docker compose up -d kreav-db
services:
  kreav-db:
    image: postgres:16-alpine
    container_name: kreav-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - '${POSTGRES_PORT}:5432'
    volumes:
      - kreav-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  kreav-db-data:
